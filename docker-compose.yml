version: '3.8'

services:
  # BACKEND API
  autify-api:
    build:
      context: ./backend
      args:
        - CACHE_BUST=2.17.5
    container_name: Autify-API
    environment:
      - MONGODB_URL=mongodb://autify-db:27017
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TZ=Europe/Rome
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - autify-db
    restart: unless-stopped

  # FRONTEND ADMIN (porta 8090)
  autify-admin:
    build:
      context: ./frontend_admin
      args:
        - CACHE_BUST=2.17.5
    container_name: Autify-Admin
    ports:
      - "8090:80"
    depends_on:
      - autify-api
    restart: unless-stopped

  # FRONTEND CLIENT (porta 8091)
  autify-client:
    build:
      context: ./frontend_client
      args:
        - CACHE_BUST=2.17.5
    container_name: Autify-Client
    ports:
      - "8091:80"
    depends_on:
      - autify-api
    restart: unless-stopped

  # DATABASE
  autify-db:
    image: mongo:latest
    container_name: Autify_MongoDB
    restart: unless-stopped
    volumes:
      - autify_data:/data/db

volumes:
  autify_data:
