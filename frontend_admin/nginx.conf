server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    root /usr/share/nginx/html;
    index index.html;

    # Disabilita la cache per l'index.html in modo che carichi sempre l'ultimo main.dart.js
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Invia tutto il traffico normale all'app Flutter
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching aggressivo per file statici di Flutter Web (es. canvaskit, main.dart.js)
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Intercetta le chiamate /api/ e le gira al container FastAPI
    location /api/ {
        proxy_pass http://autify-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}